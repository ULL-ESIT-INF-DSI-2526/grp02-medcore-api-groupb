name: CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x, 25.x]
        mongodb-version: ['6.0', '7.0', '8.0']

    steps:
    - name: Git checkout
      uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.12.1
      with:
        mongodb-version: ${{ matrix.mongodb-version }}

    - name: Install dependencies 
      run: npm ci
    
    - name: Override test.env for CI (use local Mongo)
      run: |
        printf "PORT=3000\nMONGODB_URL=mongodb://127.0.0.1:27017/medcore-test\nSWAGGER_SERVER=http://localhost:3000\n" > ./config/test.env

    - name: Running tests
      run: npm run test